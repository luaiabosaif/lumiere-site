<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIERE | لوميير للعطور</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --gray: #1a1a1a; --white: #ffffff; }
        body { background: var(--dark); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { text-align: center; padding: 30px; border-bottom: 1px solid var(--gold); }
        h1 { color: var(--gold); letter-spacing: 4px; margin: 0; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* دليل الاختيار ونظام النقاط */
        .top-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card-box { background: var(--gray); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; }
        .progress-bar { background: #333; height: 10px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--gold); height: 100%; width: 0%; transition: 1s; }
        
        /* شبكة العطور */
        .perfume-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .perfume-card { background: var(--gray); border-radius: 15px; padding: 20px; border: 1px solid #333; position: relative; }
        .perfume-card img { width: 100%; border-radius: 10px; height: 350px; object-fit: cover; }
        .notes { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .notes span { background: #000; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; border: 1px solid var(--gold); color: var(--gold); }
        .price { font-size: 1.3rem; color: var(--gold); font-weight: bold; }
        
        input { width: 100%; padding: 12px; margin-top: 8px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; }

        /* الشاشات المنبثقة */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: var(--gray); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); max-width: 450px; width: 90%; text-align: center; }
        .quiz-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px; margin: 5px; width: 100%; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>

<header><h1>LUMIERE</h1></header>

<div class="container">
    <div class="top-section">
        <div class="card-box" onclick="openQuiz()" style="cursor: pointer;">
            <h3 style="color: var(--gold);">✨ نساعدك باختيار عطرك؟</h3>
            <p style="font-size: 0.8rem;">جاوب على 3 أسئلة لنحدد عطرك المثالي</p>
        </div>
        <div class="card-box">
            <h3 id="ptsTxt">نقاطك: 0</h3>
            <div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
            <p style="font-size: 0.7rem; color: var(--gold);">اجمع 650 نقطة واحصل على عطر 55 مل مجاناً</p>
        </div>
    </div>

    <div id="perfumeGrid" class="perfume-grid"></div>

    <div class="card-box" style="margin-top: 40px; border-style: dashed;">
        <h2 style="color: var(--gold);">🧪 صمم عطرك الخاص</h2>
        <p>اكتب لنا الروائح التي تحبها وسنقوم بتركيب عطر حصري لك</p>
        <input type="text" id="customReq" placeholder="مثلاً: أحب العود مع لمسة فانيلا">
        <input type="tel" id="customPhone" placeholder="رقم هاتفك">
        <button onclick="orderCustom()">طلب التصميم الخاص</button>
    </div>
</div>

<div id="quizModal" class="modal"><div class="modal-content" id="quizBody"></div></div>

<div id="successModal" class="modal">
    <div class="modal-content">
        <div style="font-size: 50px; color: var(--gold);">✔</div>
        <h2>تم استلام طلبك!</h2>
        <p>شكراً لثقتك بـ لوميير. رح نتواصل معك قريباً.</p>
        <button onclick="location.reload()">موافق</button>
    </div>
</div>

<script>
    const perfumes = [
        { name: "LV Imagination 100ML", price: "13", img: "perfume1.jpg", desc: "إبداع من الحمضيات والشاي الصيني المنعش.", notes: ["🍋 ليمون", "🌿 شاي", "🪵 خشب"], mood: "صيفي" },
        { name: "LV Pacific Chill 100ML", price: "13", img: "perfume2.jpg", desc: "انتعاش المحيط بلسمة الكشمش الأسود.", notes: ["🍊 برتقال", "🍃 نعناع", "🧊 انتعاش"], mood: "صيفي" },
        { name: "TERRE DHERMES 110ML", price: "14", img: "perfume3.jpg", desc: "عطر يتميز بتركيبته الخشبية والتوابل الدافئة.", notes: ["✨ خشب", "🌹 أزهار", "🪵 عود"], mood: "رسمي" },
        { name: "DE MARLY PEGASUS 110ML", price: "14", img: "perfume4.jpg", desc: "عطر يجمع الأناقة الكلاسيكية بالرائحة الدافئة.", notes: ["🌰 عنبر", "🪵 خشب الأرز", "✨ الورد"], mood: "رسمي" },
        { name: "GISSAH IMPEREAL 110ML", price: "14", img: "perfume5.jpg", desc: "إشراقة صباحية مفعمة بالحيوية والنشاط.", notes: ["🍏 فواكه", "🌸 زهور", "🍋 حمضيات"], mood: "يومي" },
        { name: "FRANKEL AVENTUS ASSAF 110ML", price: "14", img: "perfume6.jpg", desc: "البصمة الخاصة لبراند لوميير الأكثر طلباً.", notes: ["🔱 خاص", "🪵 ليمون", "🍋 العنبر"], mood: "يومي" }
    ];

    const BOT = '8157330507:AAEWuYgdc0DwzeQjK-sLQiSPSd5zR64jotA';
    const CHAT = '1930480017';

    function updatePoints() {
        let pts = parseInt(localStorage.getItem('l_pts')) || 0;
        document.getElementById('ptsTxt').innerText = `نقاطك: ${pts}`;
        document.getElementById('bar').style.width = Math.min((pts/650)*100, 100) + '%';
    }

    function render() {
        document.getElementById('perfumeGrid').innerHTML = perfumes.map((p, i) => `
            <div class="perfume-card">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p style="font-size:0.8rem; color:#aaa;">${p.desc}</p>
                <div class="notes">${p.notes.map(n => `<span>${n}</span>`).join('')}</div>
                <div class="price">${p.price} د.أ</div>
                <input type="text" id="n-${i}" placeholder="الاسم">
                <input type="tel" id="p-${i}" placeholder="رقم الهاتف">
                <button onclick="order('${p.name}', 'n-${i}', 'p-${i}')">اطلب الآن</button>
            </div>
        `).join('');
    }

    async function send(msg) {
        await fetch(`https://api.telegram.org/bot${BOT}/sendMessage?chat_id=${CHAT}&text=${encodeURIComponent(msg)}`);
        document.getElementById('successModal').style.display = 'flex';
    }

    async function order(pName, nId, pId) {
        const n = document.getElementById(nId).value, p = document.getElementById(pId).value;
        if(!n || !p) return alert("عبي البيانات");
        let pts = (parseInt(localStorage.getItem('l_pts')) || 0) + 130;
        localStorage.setItem('l_pts', pts);
        updatePoints();
        const wa = `https://wa.me/962${p.substring(1)}?text=أهلاً ${n}، طلبك ${pName} مسجل`;
        send(`🚨 طلب عطر: ${pName}\n👤 الزبون: ${n}\n📞 الرقم: ${p}\n⭐ النقاط: ${pts}\n🔗 واتساب:\n${wa}`);
    }

    async function orderCustom() {
        const req = document.getElementById('customReq').value, ph = document.getElementById('customPhone').value;
        if(!req || !ph) return alert("عبي بيانات التصميم");
        send(`🧪 طلب تصميم خاص:\n📝 الطلب: ${req}\n📞 الرقم: ${ph}`);
    }

    function openQuiz() { document.getElementById('quizModal').style.display = 'flex'; step1(); }
    function step1() {
        document.getElementById('quizBody').innerHTML = `<h3>أي جو تفضل؟</h3>
            <button class="quiz-btn" onclick="finish('صيفي')">صيفي وانتعاش</button>
            <button class="quiz-btn" onclick="finish('رسمي')">رسمي وفخامة</button>
            <button class="quiz-btn" onclick="finish('يومي')">يومي وجذاب</button>`;
    }
    function finish(m) {
        const res = perfumes.find(p => p.mood === m);
        document.getElementById('quizBody').innerHTML = `<h3>نرشح لك: ${res.name}</h3><button class="quiz-btn" onclick="location.reload()">الرجوع للمتجر</button>`;
    }

    window.onload = () => { render(); updatePoints(); };
</script>
</body>
</html>

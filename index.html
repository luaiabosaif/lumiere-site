<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIERE | LV Pacific Chill</title>
    <style>
        :root { --gold: #b8860b; --black: #1a1a1a; --white: #ffffff; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            color: var(--white);
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(20,20,20,0.5) 100%), 
                        url('https://images.unsplash.com/photo-1546761404-e538f906e575?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        nav { background: rgba(0,0,0,0.8); color: white; padding: 1.2rem; text-align: center; font-size: 1.8rem; letter-spacing: 3px; font-weight: bold; border-bottom: 2px solid var(--gold); }
        .hero { padding: 60px 20px; display: flex; justify-content: center; align-items: center; }
        .product-card { 
            background: rgba(255, 255, 255, 0.95); 
            max-width: 400px; 
            border-radius: 25px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.2); 
            transition: 0.3s;
            color: var(--black);
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: auto; display: block; }
        .content { padding: 30px; text-align: center; }
        h2 { margin: 0; color: var(--black); font-size: 2rem; letter-spacing: 1px; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.6rem; margin: 15px 0; background: rgba(0,0,0,0.1); padding: 5px 15px; border-radius: 10px; display: inline-block; }
        .description { font-size: 1rem; line-height: 1.7; color: #444; margin-bottom: 25px; padding: 0 10px; }
        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 15px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1.1rem; 
            background: var(--white);
            color: var(--black);
        }
        input:focus { border-color: var(--black); outline: none; }
        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--black); 
            color: var(--white); 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            font-weight: bold; 
            transition: 0.4s; 
            text-transform: uppercase;
        }
        button:hover { background: var(--gold); }
    </style>
</head>
<body>

<nav>LUMIERE</nav>

<div class="hero" style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 40px 20px;">
    <div class="product-card">
        <img src="public/perfume1.jpg" alt="LV Pacific Chill">
        <div class="content">
            <h2>LV Pacific Chill</h2>
            <p class="price">13 دينار أردني - 100 مل</p>
            <p class="description">
                انتعاش لا يُقاوم يجمع بين الطبيعة الخلابة والبحر. <br>
                <b>مكوناته:</b> الليمون، الريحان، البرتقال، والنعناع.
            </p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <input type="text" id="name1" placeholder="تعبئة الاسم">
            <input type="text" id="phone1" placeholder="رقم الهاتف (واتساب)">
            <button onclick="orderNow('LV Pacific Chill', 'name1', 'phone1')">اطلب الآن 🔥</button>
        </div>
    </div>

    <div class="product-card">
        <img src="public/perfume2.jpg" alt="LV Imagination">
        <div class="content">
            <h2>LV Imagination</h2>
            <p class="price">13 دينار أردني - 100 مل</p>
            <p class="description">
                فخامة الخيال، عطر رجالي بلمسة ساحرة تعزز الثقة. <br>
                <b>مكوناته:</b> البرتقال، الزنجبيل، القرفة، والبرغموت.
            </p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <input type="text" id="name2" placeholder="تعبئة الاسم">
            <input type="text" id="phone2" placeholder="رقم الهاتف (واتساب)">
            <button onclick="orderNow('LV Imagination', 'name2', 'phone2')">اطلب الآن 🔥</button>
        </div>
    </div>
</div>

<script>
    async function orderNow(productName, nameId, phoneId) {
        const nameInput = document.getElementById(nameId).value;
        const phoneInput = document.getElementById(phoneId).value;

        if(!nameInput || !phoneInput) {
            return alert("يا ريت تعبي الاسم ورقم التلفون عشان نتواصل معك لخدمتك");
        }

        const customerData = {
            name: nameInput,
            phone: phoneInput,
            product: productName
        };

        try {
            const res = await fetch('/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(customerData)
            });

            if(res.ok) {
                alert(`تم استلام طلبك لـ ${productName} بنجاح! ✅ سنتواصل معك قريباً.`);
            } else {
                alert("حدث خطأ بسيط في إرسال الطلب، حاول مرة ثانية.");
            }
        } catch (error) {
            alert("السيرفر لا يستجيب حالياً، تأكد من اتصالك.");
        }
    }
</script>

</body>
</html>

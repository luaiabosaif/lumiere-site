<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIERE | LV Pacific Chill</title>
    <style>
     :root {
    --gold: #d4af37;
    --black: #0a0a0a;
    --dark-grey: #1a1a1a;
    --white: #ffffff;
}

body {
    font-family: 'Cairo', sans-serif;
    background-color: var(--black);
    color: var(--white);
    margin: 0;
    direction: rtl;
}

nav {
    background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
    padding: 25px;
    text-align: center;
    font-size: 2.2rem;
    font-weight: bold;
    letter-spacing: 4px;
    color: var(--gold);
    border-bottom: 1px solid var(--gold);
    text-transform: uppercase;
}

.hero {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    justify-content: center;
    padding: 60px 20px;
}

.product-card {
    background: var(--dark-grey);
    width: 350px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid #333;
    transition: 0.4s;
}

.product-card:hover {
    transform: translateY(-10px);
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
}

.product-card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    filter: grayscale(20%);
    transition: 0.4s;
}

.product-card:hover img {
    filter: grayscale(0%);
}

.content {
    padding: 25px;
    text-align: center;
}

h2 {
    color: var(--gold);
    margin: 0;
    font-size: 1.8rem;
}

.price {
    font-size: 1.4rem;
    color: var(--white);
    margin: 15px 0;
    font-weight: bold;
}

.description {
    font-size: 0.95rem;
    color: #bbb;
    line-height: 1.6;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    background: #222;
    border: 1px solid #444;
    border-radius: 8px;
    color: white;
    text-align: center;
}

input:focus {
    border-color: var(--gold);
    outline: none;
}

button {
    width: 100%;
    padding: 15px;
    background: var(--gold);
    color: black;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 1.1rem;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #b8962d;
    letter-spacing: 1px;
}
    </style>
</head>
<body>

<nav>LUMIERE</nav>

<div class="hero" style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 40px 20px;">
    <div class="product-card">
        <img src="public/perfume1.jpg" alt="LV Pacific Chill">
        <div class="content">
            <h2>LV Pacific Chill</h2>
            <p class="price">13 دينار أردني - 100 مل</p>
            <p class="description">
                انتعاش لا يُقاوم يجمع بين الطبيعة الخلابة والبحر. <br>
                <b>مكوناته:</b> الليمون، الريحان، البرتقال، والنعناع.
            </p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <input type="text" id="name1" placeholder="تعبئة الاسم">
            <input type="text" id="phone1" placeholder="رقم الهاتف (واتساب)">
            <button onclick="orderNow('LV Pacific Chill', 'name1', 'phone1')">اطلب الآن 🔥</button>
        </div>
    </div>

    <div class="product-card">
        <img src="public/perfume2.jpg" alt="LV Imagination">
        <div class="content">
            <h2>LV Imagination</h2>
            <p class="price">13 دينار أردني - 100 مل</p>
            <p class="description">
                فخامة الخيال، عطر رجالي بلمسة ساحرة تعزز الثقة. <br>
                <b>مكوناته:</b> البرتقال، الزنجبيل، القرفة، والبرغموت.
            </p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <input type="text" id="name2" placeholder="تعبئة الاسم">
            <input type="text" id="phone2" placeholder="رقم الهاتف (واتساب)">
            <button onclick="orderNow('LV Imagination', 'name2', 'phone2')">اطلب الآن 🔥</button>
        </div>
    </div>
</div>

<script>
    async function orderNow(productName, nameId, phoneId) {
        const nameInput = document.getElementById(nameId).value;
        const phoneInput = document.getElementById(phoneId).value;

        if(!nameInput || !phoneInput) {
            return alert("يا ريت تعبي الاسم ورقم التلفون عشان نتواصل معك لخدمتك");
        }

        const customerData = {
            name: nameInput,
            phone: phoneInput,
            product: productName
        };

        try {
            const res = await fetch('/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(customerData)
            });

            if(res.ok) {
                alert(`تم استلام طلبك لـ ${productName} بنجاح! ✅ سنتواصل معك قريباً.`);
            } else {
                alert("حدث خطأ بسيط في إرسال الطلب، حاول مرة ثانية.");
            }
        } catch (error) {
            alert("السيرفر لا يستجيب حالياً، تأكد من اتصالك.");
        }
    }
</script>

</body>
</html>

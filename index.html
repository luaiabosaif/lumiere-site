<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIERE | لوميير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card-bg: #1a1a1a; --text: #ffffff; --input-bg: #252525; }
        body.day-mode { --bg: #f9f9f9; --card-bg: #ffffff; --text: #1a1a1a; --input-bg: #f0f0f0; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; direction: rtl; transition: 1s; overflow-x: hidden; }
        nav { background: var(--card-bg); padding: 25px; text-align: center; font-size: 2.2rem; font-weight: bold; color: var(--gold); border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .mood-msg { text-align: center; padding: 10px; font-size: 0.9rem; color: var(--gold); font-weight: bold; }
        
        /* زر المستشار الذكي */
        .quiz-launcher { text-align: center; padding: 20px; }
        .quiz-btn { background: transparent; color: var(--gold); border: 2px solid var(--gold); padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; }
        .quiz-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 20px var(--gold); }

        .hero { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; padding: 40px 10px; }
        .product-card { background: var(--card-bg); width: 320px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(212, 175, 55, 0.2); transition: 0.3s; perspective: 1000px; }
        .img-container { height: 320px; overflow: hidden; position: relative; background: #111; display: flex; align-items: center; justify-content: center; }
        .product-card img { width: 115%; height: 115%; object-fit: cover; transition: 0.1s linear; }
        .content { padding: 20px; text-align: center; }
        h2 { color: var(--gold); font-size: 1.3rem; margin: 0; }
        .desc { font-size: 0.8rem; color: #888; margin: 8px 0; min-height: 35px; }
        .price { font-size: 1.3rem; font-weight: bold; margin: 10px 0; color: var(--gold); }
        .notes-grid { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .note-tag { background: rgba(212, 175, 55, 0.1); padding: 3px 8px; border-radius: 12px; font-size: 0.7rem; color: var(--gold); border: 1px solid rgba(212, 175, 55, 0.3); }
        
        input, select { width: 85%; padding: 10px; margin-bottom: 8px; background: var(--input-bg); border: 1px solid rgba(128,128,128,0.2); border-radius: 8px; color: var(--text); text-align: center; font-family: 'Cairo'; }
        button { width: 90%; padding: 12px; background: var(--gold); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }
        
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { background: var(--card-bg); margin: 10% auto; padding: 30px; border: 1px solid var(--gold); width: 85%; max-width: 450px; border-radius: 20px; text-align: center; position: relative; }
        
        .quiz-step { display: none; }
        .quiz-step.active { display: block; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: var(--input-bg); border: 1px solid var(--gold); color: var(--text); border-radius: 10px; cursor: pointer; font-family: 'Cairo'; }
        .option-btn:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

<nav>LUMIERE</nav>
<div id="moodMessage" class="mood-msg">تحميل...</div>

<div class="quiz-launcher">
    <button class="quiz-btn" onclick="openQuiz()">🕵️‍♂️ مش عارف شو تختار؟ دعنا نساعدك</button>
</div>

<div id="perfumes-container" class="hero"></div>

<div id="perfumeQuizModal" class="modal">
    <div class="modal-content">
        <button onclick="closeQuiz()" style="position:absolute; left:15px; top:10px; background:none; color:white; width:auto; font-size:1.5rem;">✕</button>
        <div id="step1" class="quiz-step active">
            <h2 style="margin-bottom:20px;">شو الجو اللي بتفضله؟</h2>
            <button class="option-btn" onclick="nextStep(2, 'fresh')">منعش وصيفي 🍋</button>
            <button class="option-btn" onclick="nextStep(2, 'heavy')">ثقيل وفخم 🪵</button>
        </div>
        <div id="step2" class="quiz-step">
            <h2 style="margin-bottom:20px;">لوين طالع؟</h2>
            <button class="option-btn" onclick="nextStep(3, 'work')">دوام وشغل رسمي 💼</button>
            <button class="option-btn" onclick="nextStep(3, 'night')">سهرة أو مناسبة 🌙</button>
        </div>
        <div id="quizResult" class="quiz-step">
            <h2 id="resultText" style="color: var(--gold);">جارٍ تحليل ذوقك...</h2>
            <div id="suggestedPerfume"></div>
            <button onclick="closeQuiz()" style="margin-top:20px; background:none; color:var(--gold); border:1px solid var(--gold);">رجوع للمتجر</button>
        </div>
    </div>
</div>

<script>
   const perfumes = [
        { name: "LV Imagination 100ML", price: "13", img: "perfume1.jpg", desc: "إبداع من الحمضيات والشاي الصيني.", notes: ["🍋 ليمون", "🌿 شاي", "🪵 خشب"] },
        { name: "LV Pacific Chill 100ML", price: "13", img: "perfume2.jpg", desc: "انتعاش المحيط بلسمة الكشمش الأسود.", notes: ["🍊 برتقال", "🍃 نعناع", "🧊 انتعاش"] },
        { name: "TERRE DHERMES 110ML", price: "14", img: "perfume3.jpg", desc: "عطر يتميز بتركيبته الخشبية والتوابل.", notes: ["✨ خشب", "🌹 أزهار", "🪵 عود"] },
        { name: "DE MARLY PEGASUS 110ML", price: "14", img: "perfume4.jpg", desc: "عطر يجمع الأناقة الكلاسيكية بالرائحة الدافئة.", notes: ["🌰 عنبر", "🪵 خشب الأرز", "✨ الورد"] },
        { name: "GISSAH IMPEREAL 110ML", price: "14", img: "perfume5.jpg", desc: "إشراقة صباحية مفعمة بالحيوية.", notes: ["🍏 فواكه", "🌸 زهور", "🍋 حمضيات"] },
        { name: "FRANKEL AVENTUS ASSAF 110ML", price: "14", img: "perfume6.jpg", desc: "البصمة الخاصة لبراند لوميير.", notes: ["🔱 خاص", "🪵 ليمون", "🍋 العنبر الرسمي"] }
    ];

    let userChoices = { mood: '', event: '' };

    function openQuiz() { document.getElementById('perfumeQuizModal').style.display = 'block'; }
    function closeQuiz() { document.getElementById('perfumeQuizModal').style.display = 'none'; resetQuiz(); }

    function nextStep(step, choice) {
        if(step === 2) userChoices.mood = choice;
        if(step === 3) {
            userChoices.event = choice;
            showResult();
        }
        document.querySelectorAll('.quiz-step').forEach(s => s.classList.remove('active'));
        if(step === 2) document.getElementById('step2').classList.add('active');
        if(step === 3) document.getElementById('quizResult').classList.add('active');
    }

    function showResult() {
        const resultKey = `${userChoices.mood}_${userChoices.event}`;
        const match = perfumes.find(p => p.type === resultKey) || perfumes[0];
        
        document.getElementById('resultText').innerText = "عطرك المثالي هو:";
        document.getElementById('suggestedPerfume').innerHTML = `
            <div style="padding:20px; border:1px solid var(--gold); border-radius:15px; margin-top:15px;">
                <img src="${match.img}" style="width:100px; border-radius:10px;">
                <h3 style="color:var(--gold);">${match.name}</h3>
                <p style="font-size:0.8rem;">${match.desc}</p>
                <button onclick="scrollToPerfume('${match.name}')">اطلبه الآن</button>
            </div>
        `;
    }

    function scrollToPerfume(name) {
        closeQuiz();
        // تمرير لأسفل الصفحة للعطر المختار
        alert("تفضل، هذا هو عطر " + name + " في الأسفل!");
    }

    function resetQuiz() {
        document.querySelectorAll('.quiz-step').forEach(s => s.classList.remove('active'));
        document.getElementById('step1').classList.add('active');
    }

    function displayPerfumes() {
        const container = document.getElementById('perfumes-container');
        container.innerHTML = perfumes.map((p, index) => {
            const randomCount = Math.floor(Math.random() * 5); 
            return `
            <div class="product-card" id="card-${index}">
                <div class="img-container"><img src="${p.img}" class="parallax-img"></div>
                <div class="content">
                    <h2>${p.name}</h2>
                    <p class="desc">${p.desc}</p>
                    <div class="notes-grid">${p.notes.map(n => `<span class="note-tag">${n}</span>`).join('')}</div>
                    <p class="price">${p.price} دينار</p>
                    <p style="font-size: 0.8rem; color: var(--gold);">🔥 طلب ${randomCount} اليوم</p>
                    <input type="text" id="name-${index}" placeholder="الاسم">
                    <input type="text" id="phone-${index}" placeholder="الرقم">
                    <button onclick="orderNow('${p.name}', 'name-${index}', 'phone-${index}')">اطلب الآن 🔥</button>
                </div>
            </div>
        `}).join('') + `
            <div class="product-card" style="border: 2px solid var(--gold); background: #000;">
                <div class="img-container" style="font-size: 5rem;">🧪</div>
                <div class="content">
                    <h2>صمم عطرك الخاص</h2>
                    <p class="desc">هوية عطرية تشبهك</p>
                    <button style="background:transparent; color:var(--gold); border:1px solid var(--gold);" onclick="openQuiz()">ابدأ الرحلة ✨</button>
                </div>
            </div>
        `;
    }

    async function orderNow(pName, nId, pId) {
        const name = document.getElementById(nId).value;
        const phone = document.getElementById(pId).value;
        if(!name || !phone) return alert("الرجاء تعبئة البيانات");
        alert("تم استلام طلبك لـ " + pName + " ✅");
    }

    window.onload = () => { displayPerfumes(); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIERE | لوميير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card-bg: #1a1a1a; --text: #ffffff; --input-bg: #252525; }
        body.day-mode { --bg: #f9f9f9; --card-bg: #ffffff; --text: #1a1a1a; --input-bg: #f0f0f0; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; direction: rtl; transition: 1s; overflow-x: hidden; }
        nav { background: var(--card-bg); padding: 25px; text-align: center; font-size: 2.2rem; font-weight: bold; color: var(--gold); border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .mood-msg { text-align: center; padding: 10px; font-size: 0.9rem; color: var(--gold); font-weight: bold; }
        .hero { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; padding: 40px 10px; }
        .product-card { background: var(--card-bg); width: 320px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(212, 175, 55, 0.2); transition: 0.3s; perspective: 1000px; }
        .img-container { height: 320px; overflow: hidden; position: relative; background: #111; display: flex; align-items: center; justify-content: center; }
        .product-card img { width: 115%; height: 115%; object-fit: cover; transition: 0.1s linear; }
        .content { padding: 20px; text-align: center; }
        h2 { color: var(--gold); font-size: 1.4rem; margin: 0; }
        .desc { font-size: 0.8rem; color: #888; margin: 8px 0; min-height: 35px; }
        .price { font-size: 1.3rem; font-weight: bold; margin: 10px 0; color: var(--gold); }
        .notes-grid { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .note-tag { background: rgba(212, 175, 55, 0.1); padding: 3px 8px; border-radius: 12px; font-size: 0.7rem; color: var(--gold); border: 1px solid rgba(212, 175, 55, 0.3); }
        input { width: 85%; padding: 10px; margin-bottom: 8px; background: var(--input-bg); border: 1px solid rgba(128,128,128,0.2); border-radius: 8px; color: var(--text); text-align: center; font-family: 'Cairo'; }
        button { width: 90%; padding: 12px; background: var(--gold); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { background: var(--card-bg); margin: 10% auto; padding: 30px; border: 1px solid var(--gold); width: 80%; max-width: 400px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

<nav>LUMIERE</nav>
<div id="moodMessage" class="mood-msg">تحميل...</div>

<div id="perfumes-container" class="hero">
    </div>

<div id="quizModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--gold);">مستشار لوميير</h2>
        <input type="text" id="q_name" placeholder="الاسم">
        <input type="text" id="q_phone" placeholder="الرقم">
        <textarea id="q_notes" style="width:90%; height:60px; margin-bottom:10px;" placeholder="روائح تفضلها"></textarea>
        <button onclick="sendQuiz()">إرسال</button>
        <button onclick="document.getElementById('quizModal').style.display='none'" style="background:none; color:grey;">إغلاق</button>
    </div>
</div>

<script>
    // تم تصحيح البيانات بناءً على صورتك يا لؤي
    const perfumes = [
        { name: "LV Imagination 100ML", price: "13", img: "public/perfume1.jpg", desc: "إبداع من الحمضيات والشاي الصيني.", notes: ["🍋 ليمون", "🌿 شاي", "🪵 خشب"], count: 5 },
        { name: "LV Pacific Chill 100ML", price: "13", img: "public/perfume2.jpg", desc: "انتعاش المحيط بلمسة الكشمش الأسود.", notes: ["🍊 برتقال", "🍃 نعناع", "🧊 انتعاش"], count: 8 },
        { name: " TERRE DHERMES 110ML", price: "14", img: "public/perfume3.jpg", desc: "عطر يتميز بتركيبته الخشبية والتوابل.", notes: ["✨ خشب", "🌹 أزهار", "🪵 عود"], count: 4 },
        { name: "DE MARLY PEGASUS 110ML", price: "14", img: "public/perfume4.jpg", desc: "عطر يجمع الأناقة الكلاسيكية بالرائحة الدافئة.", notes: ["🌰 عنبر", "🪵 خشب الأرز", "✨ الورد"], count: 6 },
        { name: "GISSAH IMPEREAL 110ML", price: "14", img: "public/perfume5.jpg", desc: "إشراقة صباحية مفعمة بالحيوية.", notes: ["🍏 فواكه", "🌸 زهور", "🍋 حمضيات"], count: 7 },
        { name: "FRANKEL AVENTUS ASSAF 110ML", price: "14", img: "public/perfume6.jpg", desc: "البصمة الخاصة لبراند لوميير.", notes: ["🔱 خاص", "🪵 الليمون", "🍋 العنبر الرسمي"], count: 3 }
    ];

    function displayPerfumes() {
        const container = document.getElementById('perfumes-container');
        let html = perfumes.map((p, index) => `
            <div class="product-card" onmousemove="handleParallax(event, this)" onmouseleave="resetParallax(this)">
                <div class="img-container"><img src="${p.img}" class="parallax-img"></div>
                <div class="content">
                    <h2>${p.name}</h2>
                    <p class="desc">${p.desc}</p>
                    <div class="notes-grid">${p.notes.map(n => `<span class="note-tag">${n}</span>`).join('')}</div>
                    <p class="price">${p.price} دينار</p>
                    <p style="font-size: 0.8rem; color: var(--gold);">🔥 طلب ${p.count} اليوم</p>
                    <input type="text" id="name-${index}" placeholder="الاسم">
                    <input type="text" id="phone-${index}" placeholder="الرقم">
                    <button onclick="orderNow('${p.name}', 'name-${index}', 'phone-${index}')">اطلب الآن 🔥</button>
                </div>
            </div>
        `).join('');
        
        html += `
            <div class="product-card" style="border: 2px solid var(--gold); background: #000;">
                <div class="img-container" style="font-size: 5rem;">🧪</div>
                <div class="content">
                    <h2>صمم عطرك الخاص</h2>
                    <p class="desc">هوية عطرية تشبهك</p>
                    <button style="background:transparent; color:var(--gold); border:1px solid var(--gold);" onclick="document.getElementById('quizModal').style.display='block'">ابدأ الرحلة ✨</button>
                </div>
            </div>
        `;
        container.innerHTML = html;
    }

    function handleParallax(e, card) {
        const img = card.querySelector('.parallax-img');
        if(!img) return;
        const rect = card.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        img.style.transform = `scale(1.15) translate(${x * 25}px, ${y * 25}px)`;
    }

    function resetParallax(card) {
        const img = card.querySelector('.parallax-img');
        if(img) img.style.transform = `scale(1) translate(0, 0)`;
    }

    function applyLuxuryMood() {
        const hour = new Date().getHours();
        if (hour >= 6 && hour < 18) {
            document.body.classList.add('day-mode');
            document.getElementById('moodMessage').innerText = "صباح الخير.. ابدأ يومك بانتعاش لوميير ☀️";
        } else {
            document.body.classList.remove('day-mode');
            document.getElementById('moodMessage').innerText = "سحر المساء يبدأ من هنا 🌙";
        }
    }

    async function orderNow(pName, nId, pId) {
        const name = document.getElementById(nId).value;
        const phone = document.getElementById(pId).value;
        if(!name || !phone) return alert("عبي البيانات يا غالي");
        
        try {
            const res = await fetch('/api/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, phone, product: pName })
            });
            if(res.ok) alert("تم استلام طلبك لـ " + pName + " ✅");
        } catch (e) {
            alert("تم الإرسال بنجاح ✅");
        }
    }

    async function sendQuiz() {
        alert("سنتواصل معك للتصميم!");
        document.getElementById('quizModal').style.display='none';
    }

    window.onload = () => { applyLuxuryMood(); displayPerfumes(); };
</script>
</body>
</html>

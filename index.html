<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIERE | لوميير للعطور</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --gray: #1a1a1a; --white: #ffffff; }
        body { background: var(--dark); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { text-align: center; padding: 30px; border-bottom: 1px solid var(--gold); }
        h1 { color: var(--gold); letter-spacing: 4px; margin: 0; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* بار النقاط المستفز للزبون عشان يشتري أكثر */
        .points-card { background: var(--gray); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; margin-bottom: 30px; }
        .progress-bar { background: #333; height: 20px; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid #444; }
        .progress-fill { background: var(--gold); height: 100%; width: 0%; transition: 1s; }
        
        .perfume-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .perfume-card { background: var(--gray); border-radius: 15px; padding: 20px; border: 1px solid #333; position: relative; }
        .perfume-card img { width: 100%; border-radius: 10px; height: 350px; object-fit: cover; }
        .notes { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .notes span { background: #000; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--gold); color: var(--gold); }
        .price { font-size: 1.4rem; color: var(--gold); font-weight: bold; margin-bottom: 10px; }
        
        input { width: 100%; padding: 12px; margin-top: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--gold); border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; }
        
        .quiz-btn-main { background: var(--gray); color: var(--gold); border: 1px solid var(--gold); padding: 15px; width: 100%; border-radius: 15px; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>LUMIERE</h1>
</header>

<div class="container">
    <div class="points-card">
        <h3 id="pointsText">نقاطك الحالية: 0 نقطة</h3>
        <p style="font-size: 0.9rem; color: #ccc;">جمع 650 نقطة واحصل على عطر 55 مل مجاناً! 🎁</p>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <p id="pointsGoal" style="font-size: 0.8rem; color: var(--gold);">باقي لك 650 نقطة على الهدية</p>
    </div>

    <button class="quiz-btn-main" onclick="alert('قريباً: دليل اختيار العطر الذكي!')">✨ نساعدك باختيار عطرك؟</button>

    <div id="perfumeGrid" class="perfume-grid"></div>
</div>

<script>
    const perfumes = [
        { name: "LV Imagination 100ML", price: "13", img: "perfume1.jpg", notes: ["🍋 ليمون", "🌿 شاي", "🪵 خشب"] },
        { name: "LV Pacific Chill 100ML", price: "13", img: "perfume2.jpg", notes: ["🍊 برتقال", "🍃 نعناع", "🧊 انتعاش"] },
        { name: "TERRE DHERMES 110ML", price: "14", img: "perfume3.jpg", notes: ["✨ خشب", "🌹 أزهار", "🪵 عود"] },
        { name: "DE MARLY PEGASUS 110ML", price: "14", img: "perfume4.jpg", notes: ["🌰 عنبر", "🪵 خشب الأرز", "✨ الورد"] },
        { name: "GISSAH IMPEREAL 110ML", price: "14", img: "perfume5.jpg", notes: ["🍏 فواكه", "🌸 زهور", "🍋 حمضيات"] },
        { name: "FRANKEL AVENTUS ASSAF 110ML", price: "14", img: "perfume6.jpg", notes: ["🔱 خاص", "🪵 ليمون", "🍋 العنبر"] }
    ];

    const TELEGRAM_BOT_TOKEN = '8157330507:AAEWuYgdc0DwzeQjK-sLQiSPSd5zR64jotA';
    const TELEGRAM_CHAT_ID = '1930480017';

    // تحديث واجهة النقاط
    function updatePointsUI() {
        let currentPoints = parseInt(localStorage.getItem('lumiere_points')) || 0;
        document.getElementById('pointsText').innerText = `نقاطك الحالية: ${currentPoints} نقطة`;
        
        let percent = (currentPoints / 650) * 100;
        if(percent > 100) percent = 100;
        document.getElementById('progressFill').style.width = percent + '%';
        
        let remaining = 650 - currentPoints;
        document.getElementById('pointsGoal').innerText = remaining > 0 ? `باقي لك ${remaining} نقطة على الهدية` : "مبروك! استحقيت العطر المجاني 🎁";
    }

    function displayPerfumes() {
        const grid = document.getElementById('perfumeGrid');
        grid.innerHTML = perfumes.map((p, index) => `
            <div class="perfume-card">
                <img src="${p.img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <div class="notes">${p.notes.map(n => `<span>${n}</span>`).join('')}</div>
                <div class="price">${p.price} دينار</div>
                <p style="color:var(--gold); font-size:0.8rem;">+130 نقطة عند الشراء</p>
                <input type="text" id="name-${index}" placeholder="الاسم الكريم">
                <input type="tel" id="phone-${index}" placeholder="رقم الموبايل">
                <button onclick="orderNow('${p.name}', 'name-${index}', 'phone-${index}')">اطلب الآن</button>
            </div>
        `).join('');
    }

    async function orderNow(pName, nId, pId) {
        const name = document.getElementById(nId).value;
        const phone = document.getElementById(pId).value;
        if(!name || !phone) return alert("يا غالي عبي بياناتك 🌹");

        // إضافة النقاط عند الطلب
        let points = parseInt(localStorage.getItem('lumiere_points')) || 0;
        points += 130;
        localStorage.setItem('lumiere_points', points);
        updatePointsUI();

        // تجهيز رابط الواتساب
        let cleanPhone = phone.replace(/\D/g, ''); 
        if(cleanPhone.startsWith('0')) cleanPhone = '962' + cleanPhone.substring(1);
        const waLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent('أهلاً ' + name + '، سجلت طلبك لعطر ' + pName + ' ونقاطك صارت ' + points)}`;

        const message = `🚨 طلب جديد: \n👤 الزبون: ${name}\n📞 الرقم: ${phone}\n🧴 العطر: ${pName}\n⭐ نقاطه الحالية: ${points}\n\n🔗 تواصل واتساب:\n${waLink}`;

        await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}`);
        
        alert(`تم استلام طلبك! ✅\nمبروك، ربحت 130 نقطة. مجموعك الآن: ${points}`);
    }

    window.onload = () => { displayPerfumes(); updatePointsUI(); };
</script>
</body>
</html>

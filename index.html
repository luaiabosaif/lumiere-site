<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIERE | لوميير للعطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --white: #ffffff;
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --input-bg: #252525;
        }

        body.day-mode {
            --bg: #f9f9f9;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --input-bg: #f0f0f0;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            direction: rtl; 
            transition: all 1s ease;
        }

        nav { 
            background: var(--card-bg); 
            padding: 25px; 
            text-align: center; 
            font-size: 2.2rem; 
            font-weight: bold; 
            letter-spacing: 5px; 
            color: var(--gold); 
            border-bottom: 1px solid var(--gold);
            position: sticky; top: 0; z-index: 1000;
        }

        .mood-msg { text-align: center; padding: 10px; font-size: 0.9rem; color: var(--gold); font-weight: bold; }

        .hero { display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; padding: 40px 20px; }

        .product-card { 
            background: var(--card-bg); 
            width: 340px; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); 
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: transform 0.3s ease;
            perspective: 1000px;
        }

        .img-container { 
            height: 380px; 
            overflow: hidden; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        .product-card img, .custom-icon { 
            width: 110%; 
            height: 110%;
            object-fit: cover;
            transition: transform 0.1s linear;
        }

        .custom-icon { font-size: 6rem; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background: #000; color: var(--gold); }

        .content { padding: 25px; text-align: center; }
        h2 { color: var(--gold); margin: 0; font-size: 1.6rem; }
        .price { font-size: 1.4rem; margin: 10px 0; font-weight: bold; }
        .order-status { color: var(--gold); font-weight: bold; margin-bottom: 15px; font-size: 0.85rem; }

        input, select, textarea { 
            width: 90%; padding: 12px; margin-bottom: 10px; 
            background: var(--input-bg); border: 1px solid rgba(128,128,128,0.3); 
            border-radius: 10px; color: var(--text); text-align: center; font-family: 'Cairo';
        }

        button { 
            width: 95%; padding: 15px; background: var(--gold); color: black; 
            border: none; border-radius: 10px; font-weight: bold; 
            cursor: pointer; transition: 0.4s;
        }
        button:hover { background: var(--text); color: var(--bg); box-shadow: 0 0 20px var(--gold); }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: var(--card-bg); margin: 5% auto; padding: 30px; border: 1px solid var(--gold); width: 90%; max-width: 450px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

    <nav>LUMIERE</nav>
    <div id="moodMessage" class="mood-msg">تحميل الفخامة...</div>

    <div class="hero">
        <div class="product-card" onmousemove="handleParallax(event, this)" onmouseleave="resetParallax(this)">
            <div class="img-container">
                <img src="public/perfume1.jpg" class="parallax-img" alt="Imagination">
            </div>
            <div class="content">
                <h2>LV Imagination</h2>
                <p class="price">13 دينار - 100 مل</p>
                <p class="order-status">🔥 تم طلب <span class="count-number">5</span> قطع اليوم</p>
                <input type="text" id="name1" placeholder="الاسم">
                <input type="text" id="phone1" placeholder="رقم الهاتف">
                <button onclick="orderNow('LV Imagination', 'name1', 'phone1')">اطلب الآن 🔥</button>
            </div>
        </div>

        <div class="product-card" onmousemove="handleParallax(event, this)" onmouseleave="resetParallax(this)">
            <div class="img-container">
                <img src="public/perfume2.jpg" class="parallax-img" alt="Pacific Chill">
            </div>
            <div class="content">
                <h2>LV Pacific Chill</h2>
                <p class="price">13 دينار - 100 مل</p>
                <p class="order-status">🔥 تم طلب <span class="count-number">8</span> قطع اليوم</p>
                <input type="text" id="name2" placeholder="الاسم">
                <input type="text" id="phone2" placeholder="رقم الهاتف">
                <button onclick="orderNow('LV Pacific Chill', 'name2', 'phone2')">اطلب الآن 🔥</button>
            </div>
        </div>

        <div class="product-card" onmousemove="handleParallax(event, this)" onmouseleave="resetParallax(this)" style="border: 2px solid var(--gold);">
            <div class="img-container">
                <div class="custom-icon parallax-img">🧪</div>
            </div>
            <div class="content">
                <h2>صمم عطرك الخاص</h2>
                <p style="color: #888; margin-bottom: 20px;">هوية عطرية تشبهك تماماً</p>
                <button onclick="document.getElementById('quizModal').style.display='block'" style="background: transparent; color: var(--gold); border: 1px solid var(--gold);">ابدأ الرحلة ✨</button>
            </div>
        </div>
    </div>

    <div id="quizModal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--gold);">مستشار لوميير الذكي</h2>
            <input type="text" id="q_name" placeholder="الاسم الكريم">
            <input type="text" id="q_phone" placeholder="رقم واتساب">
            <select id="q_time">
                <option value="">وقت الاستخدام؟</option>
                <option value="صباحي">صباحي منعش</option>
                <option value="مسائي">مسائي فخم</option>
            </select>
            <textarea id="q_notes" placeholder="روائح تحبها..."></textarea>
            <button onclick="sendQuiz()">إرسال التفاصيل 🚀</button>
            <button onclick="document.getElementById('quizModal').style.display='none'" style="background:none; color:grey; margin-top:10px;">إغلاق</button>
        </div>
    </div>

    <script>
        function applyLuxuryMood() {
            const hour = new Date().getHours();
            const body = document.body;
            const msg = document.getElementById('moodMessage');
            if (hour >= 6 && hour < 18) {
                body.classList.add('day-mode');
                msg.innerText = "صباح الخير.. ابدأ يومك بانتعاش لوميير ☀️";
            } else {
                body.classList.remove('day-mode');
                msg.innerText = "سحر المساء يبدأ من هنا.. تجربة لوميير الملكية 🌙";
            }
        }

        function handleParallax(e, card) {
            const img = card.querySelector('.parallax-img');
            const rect = card.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            img.style.transform = `scale(1.1) translate(${x * 25}px, ${y * 25}px)`;
        }

        function resetParallax(card) {
            const img = card.querySelector('.parallax-img');
            img.style.transform = `scale(1) translate(0, 0)`;
        }

        window.onload = () => { applyLuxuryMood(); updateCounters(); };

        function updateCounters() {
            const counters = document.querySelectorAll('.count-number');
            let counts = [5, 8]; 
            setInterval(() => {
                counters.forEach((el, index) => {
                    const isIncreasing = Math.random() > 0.4;
                    counts[index] += (isIncreasing ? 1 : -1);
                    if (counts[index] < 4) counts[index] = 4;
                    if (counts[index] > 12) counts[index] = 12;
                    el.innerText = counts[index];
                });
            }, 1200000);
        }

        async function orderNow(productName, nameId, phoneId) {
            const name = document.getElementById(nameId).value;
            const phone = document.getElementById(phoneId).value;
            if(!name || !phone) return alert("عبي البيانات يا بطل");
            sendToServer({ name, phone, product: productName });
        }

        async function sendQuiz() {
            const name = document.getElementById('q_name').value;
            const phone = document.getElementById('q_phone').value;
            if(!name || !phone) return alert("الاسم والرقم ضروريين");
            sendToServer({ name, phone, product: "تصميم خاص: " + document.getElementById('q_notes').value });
            document.getElementById('quizModal').style.display='none';
        }

        async function sendToServer(data) {
            try {
                const res = await fetch('/api/order', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(res.ok) alert("تم استلام طلبك بنجاح ✅");
            } catch (e) { alert("حدث خطأ بسيط، حاول ثانية"); }
        }
    </script>
</body>
</html>
